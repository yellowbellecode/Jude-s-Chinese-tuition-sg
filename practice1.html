<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Practice Writing - Lesson 1 | Jude's Chinese Tuition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white;
            border-radius: 30px;
            padding: 1.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }
        .practice-card { 
            background: #f8f9fa; 
            border-radius: 20px; 
            padding: 1.5rem; 
            border: 2px solid #e9ecef;
        }
        .hint-box { 
            margin-bottom: 1.5rem; 
            text-align: center;
            padding: 1rem;
            background: #e3f2fd;
            border-radius: 15px;
        }
        .hint-box strong {
            font-size: 1.2rem;
            color: #2c3e50;
        }
        .english-word {
            font-size: 2.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 0.5rem 0;
        }
        
        /* Writing Boxes Grid - Perfect for Apple Pencil */
        .writing-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1.5rem 0;
        }
        
        .box-label {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .character-boxes {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1rem 0;
        }
        
        .box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .writing-box {
            width: 100px;
            height: 100px;
            border: 3px solid #2c3e50;
            border-radius: 15px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-family: "KaiTi", "楷体", "STKaiti", "华文楷体", "Microsoft YaHei", serif;
            color: #2c3e50;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            touch-action: manipulation; /* Better for iPad */
            -webkit-user-select: text; /* Allow text selection for Apple Pencil */
            user-select: text;
        }
        
        /* For Apple Pencil handwriting */
        .writing-box[contenteditable="true"] {
            cursor: text;
            outline: none;
            line-height: 100px;
            text-align: center;
        }
        
        .writing-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        
        .box-number {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        
        .input-area { 
            display: flex; 
            gap: 1rem; 
            margin: 2rem 0; 
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .input-area button { 
            padding: 1rem 2rem; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 150px;
            touch-action: manipulation;
        }
        .input-area button:hover {
            background: #5a67d8;
        }
        
        .audio-btn { 
            background: #ff6b6b; 
            color: white; 
            border: none; 
            padding: 1rem 2rem; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            max-width: 300px;
            margin: 1rem auto;
            display: block;
            touch-action: manipulation;
        }
        .audio-btn:hover {
            background: #ff5252;
        }
        
        .feedback { 
            margin-top: 1.5rem; 
            padding: 1rem; 
            border-radius: 15px; 
            display: none;
            text-align: center;
            font-size: 1.2rem;
        }
        .correct { 
            background: #d4edda; 
            color: #155724; 
            display: block; 
            border: 2px solid #c3e6cb;
        }
        .incorrect { 
            background: #f8d7da; 
            color: #721c24; 
            display: block;
            border: 2px solid #f5c6cb;
        }
        .progress {
            text-align: center;
            margin: 1rem 0;
            font-size: 1.2rem;
            color: #666;
        }
        .nav-links {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #ddd;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        
        /* Instructions for Apple Pencil */
        .pencil-tip {
            background: #fff3cd;
            border: 2px solid #ffeeba;
            border-radius: 10px;
            padding: 0.8rem;
            margin: 1rem 0;
            text-align: center;
            color: #856404;
            font-size: 1rem;
        }
        
        /* Responsive for iPad */
        @media (max-width: 768px) {
            .writing-box {
                width: 80px;
                height: 80px;
                font-size: 2rem;
                line-height: 80px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .writing-box {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
                line-height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✍️ Writing Practice: Family 家人</h1>
        
        <div class="practice-card">
            <div class="hint-box">
                <strong>Write the Chinese character for:</strong>
                <div class="english-word" id="currentEnglish">father</div>
            </div>
            
            <div style="text-align: center;">
                <button class="audio-btn" onclick="playPracticeWord()">
                    🔊 Listen to Pronunciation
                </button>
            </div>
            
            <!-- Apple Pencil Writing Grid -->
            <div class="writing-grid">
                <div class="pencil-tip">
                    ✏️ Use your Apple Pencil to write in the boxes below
                </div>
                
                <div class="box-label">Write the character:</div>
                
                <div class="character-boxes" id="characterBoxes">
                    <!-- Boxes will be generated by JavaScript -->
                </div>
                
                <!-- Hidden input to store the written text -->
                <input type="hidden" id="writingInput">
            </div>
            
            <div class="input-area">
                <button onclick="checkWriting()">✓ Check Answer</button>
                <button onclick="clearBoxes()">🗑️ Clear</button>
            </div>
            
            <div class="progress">
                Word <span id="currentWordNumber">1</span> of <span id="totalWords">4</span>
            </div>
            
            <div id="feedback" class="feedback"></div>
            
            <div class="nav-links">
                <a href="lesson1.html" target="_blank">📚 Back to Lesson 1</a>
            </div>
        </div>
    </div>

    <script>
        // Vocabulary list
        const vocabWords = [
            { chinese: "爸爸", pinyin: "bà ba", english: "father" },
            { chinese: "妈妈", pinyin: "mā ma", english: "mother" },
            { chinese: "儿子", pinyin: "ér zi", english: "son" },
            { chinese: "女儿", pinyin: "nǚ ér", english: "daughter" }
        ];

        let currentWordIndex = 0;

        // Create writing boxes based on the current word length
        function createWritingBoxes() {
            const currentWord = vocabWords[currentWordIndex].chinese;
            const boxCount = currentWord.length; // Number of characters in the word
            const boxesContainer = document.getElementById('characterBoxes');
            
            // Clear existing boxes
            boxesContainer.innerHTML = '';
            
            // Create new boxes
            for (let i = 0; i < boxCount; i++) {
                const boxContainer = document.createElement('div');
                boxContainer.className = 'box-container';
                
                const box = document.createElement('div');
                box.className = 'writing-box';
                box.setAttribute('contenteditable', 'true');
                box.setAttribute('data-box-index', i);
                box.setAttribute('id', `box-${i}`);
                
                // Add input event to collect all box contents
                box.addEventListener('input', function() {
                    combineBoxContents();
                });
                
                // Handle pasting
                box.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const text = (e.clipboardData || window.clipboardData).getData('text');
                    // Only take the first character if multiple are pasted
                    if (text.length > 0) {
                        this.textContent = text[0];
                        combineBoxContents();
                    }
                });
                
                // Handle keypress to limit to one character
                box.addEventListener('keypress', function(e) {
                    if (this.textContent.length >= 1) {
                        e.preventDefault();
                    }
                });
                
                boxContainer.appendChild(box);
                
                const boxNumber = document.createElement('div');
                boxNumber.className = 'box-number';
                boxNumber.textContent = `${i + 1}`;
                boxContainer.appendChild(boxNumber);
                
                boxesContainer.appendChild(boxContainer);
            }
        }
        
        // Combine all box contents into the hidden input
        function combineBoxContents() {
            const boxes = document.querySelectorAll('.writing-box');
            let combinedText = '';
            boxes.forEach(box => {
                combinedText += box.textContent.trim();
            });
            document.getElementById('writingInput').value = combinedText;
        }
        
        // Clear all boxes
        function clearBoxes() {
            const boxes = document.querySelectorAll('.writing-box');
            boxes.forEach(box => {
                box.textContent = '';
            });
            combineBoxContents();
            document.getElementById('writingInput').focus();
        }
        
        function updatePracticeDisplay() {
            const currentWord = vocabWords[currentWordIndex];
            document.getElementById('currentEnglish').textContent = currentWord.english;
            document.getElementById('currentWordNumber').textContent = currentWordIndex + 1;
            document.getElementById('totalWords').textContent = vocabWords.length;
            
            // Recreate boxes for the new word
            createWritingBoxes();
            
            // Focus on first box
            setTimeout(() => {
                const firstBox = document.getElementById('box-0');
                if (firstBox) firstBox.focus();
            }, 100);
        }

        function playPracticeWord() {
            const word = vocabWords[currentWordIndex].chinese;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.7;
            window.speechSynthesis.speak(utterance);
        }

        function checkWriting() {
            const input = document.getElementById('writingInput').value.trim();
            const correct = vocabWords[currentWordIndex].chinese;
            const feedback = document.getElementById('feedback');
            
            if (input === correct) {
                feedback.className = 'feedback correct';
                feedback.innerHTML = '✓ Correct! Well done! 🎉';
                
                if (currentWordIndex < vocabWords.length - 1) {
                    currentWordIndex++;
                    updatePracticeDisplay();
                    document.getElementById('writingInput').value = '';
                } else {
                    feedback.innerHTML = '🎉 Congratulations! You completed all words! 🏆';
                    document.getElementById('writingInput').disabled = true;
                }
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `✗ Try again. You wrote "${input || 'nothing'}" but expected "${correct}"`;
            }
        }

        // Initialize
        updatePracticeDisplay();

        // Handle Enter key on last box to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkWriting();
            }
        });
    </script>
</body>
</html>
